# Workflow name
name: Chromatic

on:
  pull_request:
    branches:
      - "main" # Replace with the branch you want to deploy from

# List of jobs
jobs:
  deploy:
    runs-on: ubuntu-latest
    # Job steps
    steps:
      # Manual Checkout
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Set up Node
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Publish to Chromatic
        uses: chromaui/action@v1
        with:
          # The project token can be found on the "Settings" page of your Chromatic project
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          # Optional: Set the exit-zero-on-changes flag to prevent the action from failing when changes are detected
          exitZeroOnChanges: true
